<!doctype html>

<html>
  <head>
    <meta charset="utf-8" />

    <title>LandQR OCR Lab</title>

    <link rel="stylesheet" href="css/style.css" />
  </head>

  <body>
    <div class="toolbar">
      <input id="fileInput" type="file" accept=".pdf" />

      <button id="previewButton">Preview Regions</button>
    </div>

    <div id="canvasContainer">
      <canvas id="viewer"></canvas>

      <canvas id="regionLayer"></canvas>
    </div>

    <h3>Metadata</h3>
    <div id="metadataPreview"></div>

    <h3>Coordinates</h3>
    <div id="coordinatePreview"></div>

    <h3>Planning</h3>
    <div id="planningPreview"></div>

    <script src="js/vendor/fabric/fabric.min.js"></script>
    <script src="js/vendor/pdfjs/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@v7/dist/tesseract.min.js"></script>

    <script>
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    </script>
    <script src="js/pdf/documentRenderer.js"></script>
    <script src="js/regions/regionEditor.js"></script>
    <script src="js/regions/cropper.js"></script>
    <script src="js/regions/regionPreview.js"></script>
    <script src="js/ocr/preprocessor.js"></script>
    <script src="js/ocr/ocr.js"></script>
    <script src="js/ocr/worker.js"></script>
    <script src="js/model/landDocument.js"></script>
    <script src="js/parser/documentParser.js"></script>
    <script src="js/parser/metadataParser.js"></script>
    <script src="js/parser/coordinateParser.js"></script>
    <script src="js/parser/planningParser.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
